

services:
  # ──────────────────────────────────────────────
  # Banco de Dados PostgreSQL
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: tracebox_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tracebox_password
      POSTGRES_DB: tracebox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # Backend (FastAPI)
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracebox_api
    restart: always
    expose:
      - "8000"
    environment:
      - DB_TYPE=postgres
      - PG_HOST=db
      - PG_DATABASE=tracebox_db
      - PG_USER=postgres
      - PG_PASSWORD=tracebox_password
      - PG_PORT=5432
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - ALLOWED_ORIGINS=http://localhost,http://tracebox_web:3000
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "python -c 'from database.conexao_orm import Base, engine; Base.metadata.create_all(bind=engine); print(\"Schema OK\")' &&
             python criar_admin.py &&
             uvicorn api.endpoints:app --host 0.0.0.0 --port 8000 --workers 2"

  # ──────────────────────────────────────────────
  # Frontend (Next.js)
  # ──────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
    container_name: tracebox_web
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
    depends_on:
      - api

  # ──────────────────────────────────────────────
  # Reverse Proxy (nginx)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tracebox_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/tracebox.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
